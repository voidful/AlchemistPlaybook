# Accelerate launcher config: DeepSpeed ZeRO-3, 8 GPUs, bf16
# (alignment-handbook convention). Use with sft_full.yaml / dpo_full.yaml.
# accelerate launch --config_file accelerate_zero3.yaml train.py recipe.yaml
compute_environment: LOCAL_MACHINE
debug: false
deepspeed_config:
  deepspeed_multinode_launcher: standard
  offload_optimizer_device: none      # set to 'cpu' for 70B-class DPO (Tulu 3 practice)
  offload_param_device: none
  zero3_init_flag: true
  zero3_save_16bit_model: true
  zero_stage: 3
distributed_type: DEEPSPEED
downcast_bf16: 'no'
machine_rank: 0
main_training_function: main
mixed_precision: bf16
num_machines: 1
num_processes: 8
rdzv_backend: static
same_network: true
tpu_env: []
tpu_use_cluster: false
tpu_use_sudo: false
use_cpu: false
